<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ali7usseln · COFFEE · عرض اليوم</title>
  <!-- Font Awesome (للايقونات) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #f2ede6;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      gap: 1.8rem;
    }

    /* ----- البطاقة الرئيسية - مطابقة للصورة ----- */
    .coffee-card {
      max-width: 430px;
      width: 100%;
      background: #ffffff;
      border-radius: 48px 48px 32px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06), 0 8px 16px rgba(0, 0, 0, 0.03);
      padding: 2rem 2rem 1.8rem;
      transition: transform 0.2s ease;
    }

    .coffee-card:hover {
      transform: scale(1.01);
    }

    /* رأس البطاقة: Ali7usseln — COFFEE */
    .brand {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
    }

    .brand-name {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #2c1e15;
      line-height: 1.2;
    }

    .brand-name i {
      color: #a67b5b;
      font-size: 1.9rem;
      margin-left: 0.3rem;
    }

    .coffee-tag {
      font-size: 1rem;
      font-weight: 500;
      color: #6b4f3a;
      background: #f1e9e0;
      padding: 0.25rem 1.2rem;
      border-radius: 40px;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .coffee-tag i {
      font-size: 0.9rem;
      color: #a67b5b;
    }

    /* عرض اليوم — لائيه كراميل مع كيكة الشوكولاته */
    .offer-headline {
      margin: 1.4rem 0 1rem 0;
    }

    .offer-title {
      font-size: 1.7rem;
      font-weight: 600;
      color: #2c1e15;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .offer-title .dash {
      background: #f2e2d0;
      padding: 0.1rem 1.2rem;
      border-radius: 60px;
      font-weight: 600;
      color: #3d281c;
      font-size: 1.6rem;
      line-height: 1.4;
    }

    .offer-sub {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.2rem;
      color: #5c4535;
      font-weight: 450;
      font-size: 1.15rem;
      flex-wrap: wrap;
    }

    .offer-sub i {
      color: #b48b6e;
      font-size: 1.2rem;
    }

    .offer-sub .dot {
      color: #b48b6e;
      margin: 0 0.1rem;
    }

    /* المنطقة البصرية: ايقونات القهوة والكيك */
    .product-visual {
      background: #f7efe8;
      border-radius: 32px;
      padding: 1.8rem 1.2rem 1.2rem;
      margin: 1.2rem 0 1.8rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: inset 0 1px 6px rgba(0, 0, 0, 0.02);
    }

    .product-icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2.5rem;
      flex-wrap: wrap;
      width: 100%;
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .icon-item i {
      font-size: 3rem;
      color: #3d2b1f;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.04));
    }

    .icon-item span {
      font-size: 0.75rem;
      font-weight: 500;
      color: #5f4a38;
      letter-spacing: 0.3px;
      background: rgba(255, 255, 240, 0.5);
      padding: 0.15rem 0.7rem;
      border-radius: 40px;
    }

    .product-desc {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: #3b2a1d;
      background: #ffffffcc;
      backdrop-filter: blur(2px);
      padding: 0.2rem 1.5rem;
      border-radius: 40px;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.02);
    }

    .product-desc i {
      margin: 0 0.3rem;
      color: #a67b5b;
    }

    /* السعر */
    .price-block {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      background: #ffffff;
      padding: 0.4rem 0.2rem 0.6rem 0.2rem;
      border-bottom: 2px dashed #e4d7cc;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .price {
      font-size: 3.4rem;
      font-weight: 700;
      color: #1f140e;
      letter-spacing: -0.02em;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .price small {
      font-size: 1.2rem;
      font-weight: 500;
      color: #6b4f3a;
      margin-left: 0.2rem;
    }

    .price-badge {
      background: #f2e2d0;
      padding: 0.25rem 1.2rem;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #2c1a0e;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .price-badge i {
      color: #a67b5b;
    }

    /* منيو الكافي */
    .menu-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.6rem;
      padding-top: 0.3rem;
      border-top: 1px solid #ede5db;
      color: #6b5847;
      font-weight: 450;
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    .menu-footer i {
      color: #a67b5b;
      margin-right: 0.3rem;
    }

    .menu-footer .arabic {
      font-weight: 500;
      letter-spacing: 0.3px;
      background: #f3ece4;
      padding: 0.15rem 1rem;
      border-radius: 60px;
      font-size: 0.9rem;
    }

    /* سطر إضافي (طازج يومياً) */
    .extra-note {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #bbaa9a;
      border-top: 1px solid #eee7df;
      padding-top: 0.6rem;
      margin-top: 0.5rem;
    }

    /* ----- زر PDF ----- */
    .pdf-button-wrapper {
      max-width: 430px;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: -0.2rem;
    }

    .pdf-btn {
      background: #2c1e15;
      border: none;
      padding: 1rem 2.8rem;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #f9f3ec;
      box-shadow: 0 8px 18px rgba(44, 30, 21, 0.15);
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
      width: 100%;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .pdf-btn i {
      font-size: 1.3rem;
      color: #dbbda6;
    }

    .pdf-btn:hover {
      background: #3f2c1f;
      transform: scale(1.02);
      box-shadow: 0 12px 24px rgba(44, 30, 21, 0.2);
    }

    .pdf-btn:active {
      transform: scale(0.97);
    }

    .pdf-btn:disabled {
      opacity: 0.7;
      cursor: wait;
      transform: none;
    }

    /* استجابة للشاشات الصغيرة */
    @media (max-width: 480px) {
      .coffee-card {
        padding: 1.5rem 1.2rem;
        border-radius: 36px;
      }
      .brand-name {
        font-size: 1.8rem;
      }
      .offer-title {
        font-size: 1.4rem;
      }
      .price {
        font-size: 2.8rem;
      }
      .product-icons {
        gap: 1.5rem;
      }
      .pdf-btn {
        padding: 0.9rem 1.8rem;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- ========== البطاقة ========== -->
  <div class="coffee-card" id="coffeeCard">

    <!-- Ali7usseln — COFFEE -->
    <div class="brand">
      <div class="brand-name">
        Ali7usseln <i class="fas fa-mug-saucer"></i>
      </div>
      <div class="coffee-tag">
        <i class="fas fa-seedling"></i> COFFEE
      </div>
    </div>

    <!-- عرض اليوم — لائيه كراميل مع كيكة الشوكولاته -->
    <div class="offer-headline">
      <div class="offer-title">
        <span>عرض اليوم</span>
        <span class="dash">—</span>
      </div>
      <div class="offer-sub">
        <i class="fas fa-candy-cane"></i>
        <span>لائيه كراميل</span>
        <span class="dot">·</span>
        <i class="fas fa-cake"></i>
        <span>مع كيكة الشوكولاته</span>
      </div>
    </div>

    <!-- أيقونات المنتج -->
    <div class="product-visual">
      <div class="product-icons">
        <div class="icon-item">
          <i class="fas fa-mug-hot"></i>
          <span>كراميل لاتيه</span>
        </div>
        <div class="icon-item">
          <i class="fas fa-cake"></i>
          <span>شوكولاته</span>
        </div>
      </div>
      <div class="product-desc">
        <i class="fas fa-star" style="color: #d4a373;"></i>
        <span>fresh · creamy</span>
        <i class="fas fa-star" style="color: #d4a373;"></i>
      </div>
    </div>

    <!-- السعر: 15 ريال -->
    <div class="price-block">
      <div class="price">
        15 <small>ريال</small>
      </div>
      <div class="price-badge">
        <i class="fas fa-tag"></i> عرض اليوم
      </div>
    </div>

    <!-- منيو الكافي -->
    <div class="menu-footer">
      <span><i class="fas fa-utensils"></i> منيو الكافي</span>
      <span class="arabic"><i class="fas fa-mug-saucer"></i> #Ali7usseln</span>
    </div>

    <!-- سطر إضافي (طازج يومياً) -->
    <div class="extra-note">
      <span><i class="far fa-clock"></i> طازج يومياً</span>
      <span><i class="fas fa-heart" style="color: #c29b7a;"></i> كراميل</span>
    </div>
  </div>

  <!-- ========== زر PDF ========== -->
  <div class="pdf-button-wrapper">
    <button class="pdf-btn" id="pdfTriggerBtn">
      <i class="fas fa-file-pdf"></i> عرض الـ PDF
      <i class="fas fa-arrow-right" style="font-size: 0.9rem;"></i>
    </button>
  </div>

  <!-- مكتبة html2pdf لإنشاء الـ PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer">
  </script>

  <script>
    (function() {
      const pdfBtn = document.getElementById('pdfTriggerBtn');
      const card = document.getElementById('coffeeCard');

      async function generatePDF() {
        if (!card) return;

        // نأخذ نسخة من البطاقة لعرضها في الـ PDF بدون تأثيرات الزر
        const clone = card.cloneNode(true);
        clone.style.transform = 'none';
        clone.style.margin = '0 auto';
        clone.style.maxWidth = '430px';
        clone.style.boxShadow = '0 12px 30px rgba(0,0,0,0.06)';
        clone.style.borderRadius = '48px 48px 32px 32px';

        // غلاف بخلفية متناسقة
        const wrapper = document.createElement('div');
        wrapper.style.background = '#f2ede6';
        wrapper.style.padding = '28px 20px';
        wrapper.style.display = 'flex';
        wrapper.style.justifyContent = 'center';
        wrapper.style.alignItems = 'center';
        wrapper.style.minHeight = 'auto';
        wrapper.style.width = '100%';
        wrapper.appendChild(clone);

        // إعدادات الـ PDF
        const opt = {
          margin: [0.4, 0.4, 0.4, 0.4],
          filename: 'Ali7usseln_coffee_offer.pdf',
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, letterRendering: true },
          jsPDF: { unit: 'in', format: 'a5', orientation: 'portrait' }
        };

        try {
          pdfBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جاري تحضير PDF...`;
          pdfBtn.disabled = true;

          await html2pdf().set(opt).from(wrapper).save();

          pdfBtn.innerHTML = `<i class="fas fa-file-pdf"></i> عرض الـ PDF <i class="fas fa-arrow-right" style="font-size: 0.9rem;"></i>`;
          pdfBtn.disabled = false;
        } catch (error) {
          console.warn('PDF error:', error);
          pdfBtn.innerHTML = `<i class="fas fa-file-pdf"></i> PDF (حاول مجدداً)`;
          pdfBtn.disabled = false;
          alert('حدث خطأ بسيط، يرجى المحاولة مرة أخرى.');
        }
      }

      pdfBtn.addEventListener('click', generatePDF);
    })();
  </script>

</body>
</html>
