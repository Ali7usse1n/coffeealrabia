<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ali7usseln · Coffee offer</title>
  <!-- Font Awesome (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #f2ede6;  /* soft warm background */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    /* main card – exactly like the .webp style */
    .coffee-card {
      max-width: 440px;
      width: 100%;
      background: #ffffff;
      border-radius: 48px 48px 32px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 16px rgba(0, 0, 0, 0.04);
      padding: 2rem 2rem 2.2rem;
      transition: transform 0.2s ease;
    }

    .coffee-card:hover {
      transform: scale(1.01);
    }

    /* header: Ali7usseln + coffee cup icon */
    .brand {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .brand-name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #2c1e15;
      line-height: 1.2;
    }

    .brand-name i {
      color: #a67b5b;
      font-size: 1.8rem;
      margin-left: 0.3rem;
    }

    .coffee-tag {
      font-size: 1rem;
      font-weight: 500;
      color: #6b4f3a;
      background: #f1e9e0;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .coffee-tag i {
      font-size: 0.9rem;
      color: #a67b5b;
    }

    /* offer headline */
    .offer-headline {
      margin: 1.5rem 0 1.2rem 0;
      display: flex;
      flex-direction: column;
    }

    .offer-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #2c1e15;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .offer-title .highlight {
      background: #f2e2d0;
      padding: 0.2rem 1rem;
      border-radius: 60px;
      font-weight: 600;
      color: #3d281c;
      font-size: 1.5rem;
    }

    .offer-sub {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.3rem;
      color: #5c4535;
      font-weight: 450;
      font-size: 1.1rem;
    }

    .offer-sub i {
      color: #b48b6e;
      font-size: 1.3rem;
    }

    /* main image area – stylized with text */
    .product-visual {
      background: #f7efe8;
      border-radius: 32px;
      padding: 1.8rem 1.2rem 1.2rem 1.2rem;
      margin: 1rem 0 1.8rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: inset 0 1px 6px rgba(0,0,0,0.02);
    }

    .product-icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2.2rem;
      flex-wrap: wrap;
      width: 100%;
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .icon-item i {
      font-size: 2.8rem;
      color: #3d2b1f;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.04));
    }

    .icon-item span {
      font-size: 0.75rem;
      font-weight: 500;
      color: #5f4a38;
      letter-spacing: 0.3px;
      background: rgba(255,255,240,0.6);
      padding: 0.15rem 0.7rem;
      border-radius: 40px;
    }

    .product-desc {
      margin-top: 0.7rem;
      font-size: 1rem;
      font-weight: 500;
      color: #3b2a1d;
      background: #ffffffcc;
      backdrop-filter: blur(2px);
      padding: 0.25rem 1.5rem;
      border-radius: 40px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.02);
    }

    .product-desc i {
      margin: 0 0.3rem;
      color: #a67b5b;
    }

    /* price card */
    .price-block {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      background: #ffffff;
      padding: 0.6rem 0.2rem 0.8rem 0.2rem;
      border-bottom: 2px dashed #e4d7cc;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .price {
      font-size: 3.2rem;
      font-weight: 700;
      color: #1f140e;
      letter-spacing: -0.02em;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .price small {
      font-size: 1.2rem;
      font-weight: 500;
      color: #6b4f3a;
      margin-left: 0.2rem;
    }

    .price-badge {
      background: #f2e2d0;
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #2c1a0e;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .price-badge i {
      color: #a67b5b;
    }

    /* menu note */
    .menu-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.8rem;
      padding-top: 0.3rem;
      border-top: 1px solid #ede5db;
      color: #6b5847;
      font-weight: 450;
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    .menu-footer i {
      color: #a67b5b;
      margin-right: 0.3rem;
    }

    .menu-footer .arabic {
      font-weight: 500;
      letter-spacing: 0.3px;
      background: #f3ece4;
      padding: 0.2rem 1rem;
      border-radius: 60px;
      font-size: 0.9rem;
    }

    /* responsive */
    @media (max-width: 480px) {
      .coffee-card {
        padding: 1.5rem 1.2rem;
        border-radius: 36px;
      }
      .brand-name {
        font-size: 1.8rem;
      }
      .offer-title {
        font-size: 1.4rem;
      }
      .price {
        font-size: 2.8rem;
      }
      .product-icons {
        gap: 1.2rem;
      }
    }
  </style>
</head>
<body>

<div class="coffee-card">

  <!-- header: Ali7usseln + COFFEE -->
  <div class="brand">
    <div class="brand-name">
      Ali7usseln <i class="fas fa-mug-saucer"></i>
    </div>
    <div class="coffee-tag">
      <i class="fas fa-seedling"></i> COFFEE
    </div>
  </div>

  <!-- عرض اليوم - لائيه كراميل مع كيكة الشوكولاته -->
  <div class="offer-headline">
    <div class="offer-title">
      <span>عرض اليوم</span>
      <span class="highlight">—</span>
    </div>
    <div class="offer-sub">
      <i class="fas fa-candy-cane"></i> 
      <span>لائيه كراميل</span>
      <span style="margin:0 0.2rem; color:#b48b6e;">·</span>
      <i class="fas fa-cake"></i>
      <span>مع كيكة الشوكولاته</span>
    </div>
  </div>

  <!-- visual : caramel latte + cake -->
  <div class="product-visual">
    <div class="product-icons">
      <div class="icon-item">
        <i class="fas fa-mug-hot"></i>
        <span>كراميل لاتيه</span>
      </div>
      <div class="icon-item">
        <i class="fas fa-cake"></i>
        <span>شوكولاته</span>
      </div>
    </div>
    <div class="product-desc">
      <i class="fas fa-star" style="color: #d4a373;"></i> 
      <span>fresh · creamy</span>
      <i class="fas fa-star" style="color: #d4a373;"></i>
    </div>
  </div>

  <!-- price 15 ريال -->
  <div class="price-block">
    <div class="price">
      15 <small>ريال</small>
    </div>
    <div class="price-badge">
      <i class="fas fa-tag"></i> عرض اليوم
    </div>
  </div>

  <!-- منيو الكافي -->
  <div class="menu-footer">
    <span><i class="fas fa-utensils"></i> منيو الكافي</span>
    <span class="arabic"><i class="fas fa-mug-saucer"></i> #Ali7usseln</span>
  </div>

  <!-- small extra touch: like the webp has a subtle line, we keep minimal -->
  <div style="margin-top: 0.7rem; font-size: 0.7rem; color: #bbaa9a; text-align: right; border-top: 1px solid #eee7df; padding-top: 0.5rem; display: flex; justify-content: space-between;">
    <span><i class="far fa-clock"></i> طازج يومياً</span>
    <span><i class="fas fa-heart" style="color: #c29b7a;"></i>  كراميل</span>
  </div>
</div>

<!-- optional: small note that design matches the requested .webp style -->
</body>
</html>
